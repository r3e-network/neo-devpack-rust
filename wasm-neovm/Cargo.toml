[package]
name = "wasm-neovm"
version = "0.4.0"
edition = "2021"
description = "WebAssembly to NeoVM translator"
license = "MIT"
authors = ["Neo LLVM Team"]

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
once_cell = "1.19"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
wasmparser = "0.239"
bytes = "1.6"
hex = "0.4"
sha2 = "0.10"
diff = "0.1"

[dev-dependencies]
assert_cmd = "2.0"
regex = "1.11"
tempfile = "3.10"
walkdir = "2.5"
wat = "1.0"
wasm-encoder = "0.239"

[build-dependencies]
anyhow = "1.0"
regex = "1.11"
sha2 = "0.10"
walkdir = "2.5"
