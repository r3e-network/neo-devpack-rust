[package]
name = "neo-runtime"
version = "0.1.0"
edition = "2021"
authors = ["Neo N3 DevPack Team"]
description = "Neo N3 Runtime for Smart Contract Development"

[dependencies]
neo-types = { path = "../neo-types" }
neo-syscalls = { path = "../neo-syscalls" }
thiserror = "1.0"
anyhow = "1.0"
serde_json = "1.0"
num-bigint = { version = "0.4", features = ["std"] }

[features]
default = ["std"]
std = []
