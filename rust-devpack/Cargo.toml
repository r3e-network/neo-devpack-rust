[package]
name = "neo-devpack"
version = "0.1.0"
edition = "2021"
authors = ["Neo N3 DevPack Team"]
description = "Neo N3 Rust Development Pack for Smart Contract Development"
license = "MIT"
repository = "https://github.com/neo-project/neo-devpack"
homepage = "https://github.com/neo-project/neo-devpack"
documentation = "https://docs.rs/neo-devpack"

[dependencies]
# Core dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"

# Neo N3 specific dependencies
neo-types = { path = "neo-types" }
neo-syscalls = { path = "neo-syscalls" }
neo-runtime = { path = "neo-runtime" }
neo-macros = { path = "neo-macros" }

[dev-dependencies]
criterion = "0.5"

[features]
default = ["std"]
std = []
no-std = []
alloc = []
nightly = []

[lib]
name = "neo_devpack"
path = "src/lib.rs"
