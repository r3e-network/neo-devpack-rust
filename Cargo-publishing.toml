# workspace-publishing.toml
#
# This file contains version-based dependencies for publishing to crates.io.
# Copy the relevant sections to Cargo.toml when publishing.
#
# Usage: When publishing, replace workspace.dependencies section with this version.

[workspace.dependencies]
# Core dependencies
anyhow = "1.0"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
once_cell = "1.19"
bytes = "1.6"
hex = "0.4"
sha2 = "0.10"

# WASM dependencies
wasmparser = "0.239"
wasm-encoder = "0.239"

# CLI dependencies
clap = { version = "4.5", features = ["derive"] }

# Neo N3 dependencies (CRATES.IO VERSIONS)
# These versions will be updated when new versions are published
neo-types = "0.1"
neo-syscalls = "0.1"
neo-runtime = "0.1"
neo-macros = "0.1"
neo-devpack = "0.1"
