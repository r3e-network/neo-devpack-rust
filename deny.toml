# cargo-deny configuration for neo-devpack-rust project
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# The path where the advisory database is cloned/fetched into
db-path = "~/.cargo/advisory-db"
# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db"]
# Which dependency scopes are checked for unmaintained advisories
unmaintained = "all"
# The lint level for crates that have been yanked from their source registry
yanked = "warn"

[licenses]
# List of explicitly allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "CC0-1.0",
]
# Do not warn if a listed allowed license isn't encountered in a given graph.
unused-allowed-license = "allow"
# Do not warn about unused per-crate license exceptions.
unused-license-exception = "allow"
# The confidence threshold for detecting a license from license text
confidence-threshold = 0.8

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "allow"
# Lint level for when a crate version requirement is `*`
wildcards = "warn"
# Allow wildcard path dependencies for private crates.
allow-wildcard-paths = true
# The graph highlighting used when creating dotgraphs for crates
highlight = "all"
# List of crates that are allowed
allow = []
# List of crates to deny
deny = [
    # Deny old versions with known vulnerabilities
    # Add specific crates/versions to deny if needed
]
# Certain crates/versions that will be skipped when doing duplicate detection
skip = []
# Similarly named crates that are not the same
skip-tree = []

[sources]
# Lint level for what to happen when a crate from a crate registry that is not in the allow list is encountered
unknown-registry = "warn"
# Lint level for what to happen when a crate from a git repository that is not in the allow list is encountered
unknown-git = "warn"
# List of URLs for allowed crate registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# List of URLs for allowed Git repositories
allow-git = []

[output]
# When outputting inclusion graphs in diagnostics that include features, this option can be used to specify the depth at which feature edges will be added
feature-depth = 1
