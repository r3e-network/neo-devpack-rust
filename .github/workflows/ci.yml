name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * *'

permissions:
  actions: read
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  daily-run-gate:
    name: Daily Run Gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Check if CI already ran today
        id: gate
        uses: actions/github-script@v8
        with:
          script: |
            const todayUtc = new Date().toISOString().slice(0, 10);
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: context.workflow,
              per_page: 100,
            });

            const alreadyRanToday = data.workflow_runs.some((run) => {
              if (run.id === context.runId) return false;
              if (!["push", "schedule", "pull_request"].includes(run.event)) return false;
              return run.created_at.startsWith(todayUtc);
            });

            core.setOutput("should_run", alreadyRanToday ? "false" : "true");

  neo-n3-conformance-gate:
    name: Neo N3 Conformance Matrix Gate
    needs: daily-run-gate
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify cross-crate syscall parity
        run: cargo test --manifest-path integration-tests/Cargo.toml --test syscall_parity

      - name: Verify syscall lowering reference vectors
        run: cargo test --manifest-path wasm-neovm/Cargo.toml --all-features --test neo_n3_direct_syscall_coverage --test syscall_reference_vectors

      - name: Verify Neo N3 conformance matrix has no unresolved gaps
        run: bash scripts/check_neo_n3_conformance_matrix.sh

  neo-reference-sync:
    name: Neo Reference Snapshot Sync
    needs: [daily-run-gate, neo-n3-conformance-gate]
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout canonical Neo source
        uses: actions/checkout@v4
        with:
          repository: neo-project/neo
          path: neo
          fetch-depth: 1

      - name: Checkout canonical Neo VM source
        uses: actions/checkout@v4
        with:
          repository: neo-project/neo-vm
          path: neo-vm
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify wasm-neovm against canonical Neo source
        env:
          WASM_NEOVM_REQUIRE_NEO_CHECKOUT: "1"
        run: |
          cargo test --manifest-path wasm-neovm/Cargo.toml --all-features --test opcode_consistency --test syscall_consistency

  test:
    name: Test Suite
    needs: [daily-run-gate, neo-n3-conformance-gate]
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, nightly]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust }}-cargo-build-target-

      - name: Run tests - wasm-neovm
        run: cargo test --manifest-path wasm-neovm/Cargo.toml --all-features

      - name: Run tests - move-neovm
        run: cargo test --manifest-path move-neovm/Cargo.toml --all-features

      - name: Run tests - rust-devpack
        run: cargo test --manifest-path rust-devpack/Cargo.toml --all-features

      - name: Run tests - neo-test
        run: cargo test --manifest-path rust-devpack/neo-test/Cargo.toml

      - name: Run tests - integration-tests
        run: cargo test --manifest-path integration-tests/Cargo.toml --all-features

      - name: Run tests - solana-compat
        run: cargo test --manifest-path solana-compat/Cargo.toml --all-features

  contract-tests:
    name: Contract Unit Tests
    needs: [daily-run-gate, neo-n3-conformance-gate]
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-contract-tests-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-contract-tests-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-contract-tests-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-contract-tests-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-contract-tests-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-contract-tests-cargo-build-target-

      - name: Run contract unit tests
        run: make test-contracts

  neoxp-smoke:
    name: Neo Express Smoke
    needs: [daily-run-gate, neo-n3-conformance-gate]
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-neoxp-smoke-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-neoxp-smoke-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-neoxp-smoke-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-neoxp-smoke-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-neoxp-smoke-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-neoxp-smoke-cargo-build-target-

      - name: Install smoke-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          if ! command -v wasm-snip >/dev/null 2>&1; then
            cargo install wasm-snip --locked
          fi

      - name: Install Neo Express CLI
        run: |
          mkdir -p /tmp/neo-tools
          if [ -x /tmp/neo-tools/neoxp ]; then
            dotnet tool update Neo.Express --tool-path /tmp/neo-tools
          else
            dotnet tool install Neo.Express --tool-path /tmp/neo-tools
          fi
          /tmp/neo-tools/neoxp --version

      - name: Run Neo Express smoke suite
        env:
          NEOXP_BIN: /tmp/neo-tools/neoxp
        run: make smoke-neoxp

  neoxp-integration:
    name: Neo Express Integration Tests
    needs: [daily-run-gate, neo-n3-conformance-gate]
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-neoxp-integration-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-neoxp-integration-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-neoxp-integration-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-neoxp-integration-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-neoxp-integration-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-neoxp-integration-cargo-build-target-

      - name: Install integration-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          if ! command -v wasm-snip >/dev/null 2>&1; then
            cargo install wasm-snip --locked
          fi

      - name: Install Neo Express CLI
        run: |
          mkdir -p /tmp/neo-tools
          if [ -x /tmp/neo-tools/neoxp ]; then
            dotnet tool update Neo.Express --tool-path /tmp/neo-tools
          else
            dotnet tool install Neo.Express --tool-path /tmp/neo-tools
          fi
          /tmp/neo-tools/neoxp --version

      - name: Build cross-chain integration artifacts
        run: make cross-chain

      - name: Run Neo Express integration tests
        env:
          NEOXP_BIN: /tmp/neo-tools/neoxp
        run: make integration-tests

  clippy:
    name: Clippy
    needs: [daily-run-gate, neo-n3-conformance-gate]
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-clippy-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy - wasm-neovm
        run: cargo clippy --manifest-path wasm-neovm/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Run clippy - move-neovm
        run: cargo clippy --manifest-path move-neovm/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Run clippy - rust-devpack
        run: cargo clippy --manifest-path rust-devpack/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Run clippy - neo-test
        run: cargo clippy --manifest-path rust-devpack/neo-test/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Run clippy - integration-tests
        run: cargo clippy --manifest-path integration-tests/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Run clippy - solana-compat
        run: cargo clippy --manifest-path solana-compat/Cargo.toml --all-targets --all-features -- -D warnings

  fmt:
    name: Rustfmt
    needs: [daily-run-gate, neo-n3-conformance-gate]
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting - wasm-neovm
        run: cargo fmt --manifest-path wasm-neovm/Cargo.toml --all -- --check

      - name: Check formatting - move-neovm
        run: cargo fmt --manifest-path move-neovm/Cargo.toml --all -- --check

      - name: Check formatting - rust-devpack
        run: cargo fmt --manifest-path rust-devpack/Cargo.toml --all -- --check

      - name: Check formatting - neo-test
        run: cargo fmt --manifest-path rust-devpack/neo-test/Cargo.toml --all -- --check

      - name: Check formatting - integration-tests
        run: cargo fmt --manifest-path integration-tests/Cargo.toml --all -- --check

      - name: Check formatting - solana-compat
        run: cargo fmt --manifest-path solana-compat/Cargo.toml --all -- --check

  coverage:
    name: Code Coverage
    needs: [daily-run-gate, neo-n3-conformance-gate]
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate coverage - wasm-neovm
        run: cargo tarpaulin --manifest-path wasm-neovm/Cargo.toml --out xml --output-dir ./coverage-wasm-neovm

      - name: Generate coverage - move-neovm
        run: cargo tarpaulin --manifest-path move-neovm/Cargo.toml --out xml --output-dir ./coverage-move-neovm

      - name: Generate coverage - rust-devpack
        run: cargo tarpaulin --manifest-path rust-devpack/Cargo.toml --out xml --output-dir ./coverage-rust-devpack

      - name: Generate coverage - neo-test
        run: cargo tarpaulin --manifest-path rust-devpack/neo-test/Cargo.toml --out xml --output-dir ./coverage-neo-test

      - name: Upload coverage to Codecov - wasm-neovm
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-wasm-neovm/cobertura.xml
          flags: wasm-neovm
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov - move-neovm
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-move-neovm/cobertura.xml
          flags: move-neovm
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov - rust-devpack
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-rust-devpack/cobertura.xml
          flags: rust-devpack
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov - neo-test
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-neo-test/cobertura.xml
          flags: neo-test
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Audit
    needs: [daily-run-gate, neo-n3-conformance-gate]
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Run cargo audit - wasm-neovm
        run: cargo audit --file wasm-neovm/Cargo.lock
        continue-on-error: true

      - name: Run cargo audit - move-neovm
        run: cargo audit --file move-neovm/Cargo.lock
        continue-on-error: true

      - name: Run cargo audit - rust-devpack
        run: cargo audit --file rust-devpack/Cargo.lock
        continue-on-error: true

      - name: Run cargo audit - solana-compat
        run: cargo audit --file solana-compat/Cargo.lock
        continue-on-error: true

      - name: Run cargo audit - integration-tests
        run: cargo audit --file integration-tests/Cargo.lock
        continue-on-error: true

      - name: Run cargo deny - wasm-neovm
        run: cargo deny --manifest-path wasm-neovm/Cargo.toml check -W unmaintained -W notice

      - name: Run cargo deny - move-neovm
        run: cargo deny --manifest-path move-neovm/Cargo.toml check -W unmaintained -W notice

      - name: Run cargo deny - rust-devpack
        run: cargo deny --manifest-path rust-devpack/Cargo.toml check -W unmaintained -W notice

  benchmark:
    name: Benchmark
    needs: [daily-run-gate, neo-n3-conformance-gate]
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-bench-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks - wasm-neovm
        run: cargo bench --manifest-path wasm-neovm/Cargo.toml --no-fail-fast -- --output-format bencher | tee output.txt

      - name: Ensure gh-pages branch exists
        run: |
          git fetch origin gh-pages || (
            git checkout --orphan gh-pages && \
            git rm -rf . && \
            echo "# Benchmark Results" > README.md && \
            git add README.md && \
            git commit -m "Initial gh-pages commit" && \
            git push origin gh-pages
          )
        continue-on-error: true

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          alert-threshold: '105%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@r3e-network'
        continue-on-error: true

      - name: Run benchmarks - move-neovm
        run: cargo bench --manifest-path move-neovm/Cargo.toml --no-fail-fast

  # New: Check for unused dependencies
  unused-deps:
    name: Check Unused Dependencies
    needs: [daily-run-gate, neo-n3-conformance-gate]
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-machete
        run: cargo install cargo-machete

      - name: Check unused dependencies
        run: cargo machete --with-metadata
        continue-on-error: true

  # New: Documentation check
  doc:
    name: Documentation
    needs: [daily-run-gate, neo-n3-conformance-gate]
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check documentation - wasm-neovm
        run: cargo doc --manifest-path wasm-neovm/Cargo.toml --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Check documentation - rust-devpack
        run: cargo doc --manifest-path rust-devpack/Cargo.toml --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # New: Build verification for all targets
  build:
    name: Build Verification
    needs: [daily-run-gate, neo-n3-conformance-gate]
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Build wasm-neovm
        run: cargo build --manifest-path wasm-neovm/Cargo.toml --release

      - name: Build rust-devpack
        run: cargo build --manifest-path rust-devpack/Cargo.toml --release

      - name: Build solana-compat
        run: cargo build --manifest-path solana-compat/Cargo.toml --release

      - name: Build move-neovm
        run: cargo build --manifest-path move-neovm/Cargo.toml --release

      - name: Build example contracts
        run: |
          cargo build --manifest-path contracts/hello-world/Cargo.toml --release --target wasm32-unknown-unknown
          cargo build --manifest-path contracts/nep17-token/Cargo.toml --release --target wasm32-unknown-unknown
          cargo build --manifest-path contracts/nep11-nft/Cargo.toml --release --target wasm32-unknown-unknown

  # New: Version consistency check
  version-check:
    name: Version Consistency
    needs: [daily-run-gate, neo-n3-conformance-gate]
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          chmod +x scripts/check_versions.sh
          ./scripts/check_versions.sh
