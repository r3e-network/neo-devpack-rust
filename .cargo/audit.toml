# cargo-audit configuration
# https://github.com/RustSec/rustsec/tree/main/cargo-audit

[advisories]
# Advisory IDs to ignore
ignore = [
    # RUSTSEC-2025-0141: bincode is unmaintained
    # bincode 1.3.3 is still functional and widely used
    # TODO: Migrate to bincode 2.0 or alternative when stable
    "RUSTSEC-2025-0141",
]

# Severity threshold to warn on
severity_threshold = "low"

# Deny any warning
deny = ["unmaintained", "yanked", "unsound"]

[output]
# Print results to stdout
stdout = true
# Print results to stderr
stderr = false
